name: Echoooo
options:
  bundleIdPrefix: com.janeyou
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  SwiftyDropbox:
    url: https://github.com/dropbox/SwiftyDropbox.git
    from: "10.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    INFOPLIST_FILE: Echoooo/Resources/Info.plist

targets:
  Echoooo:
    type: application
    platform: iOS
    sources:
      - Echoooo
    resources:
      - Echoooo/Resources/Assets.xcassets
    configFiles:
      Debug: Echoooo/Resources/Secrets.xcconfig
      Release: Echoooo/Resources/Secrets.xcconfig
    dependencies:
      - package: SwiftyDropbox
        product: SwiftyDropbox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.janeyou.echoooo
        INFOPLIST_FILE: Echoooo/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_DropboxAppKey: $(DROPBOX_APP_KEY)
    info:
      path: Echoooo/Resources/Info.plist
      properties:
        CFBundleName: Echoooo
        CFBundleDisplayName: Echoooo
        CFBundleIdentifier: com.janeyou.echoooo
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: Echoooo
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: Paper
          UIImageName: SplashMark
          UIImageRespectsSafeAreaInsets: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "Echoooo needs microphone access to capture conversations for transcription."
        UIBackgroundModes:
          - audio
        DropboxAppKey: $(DROPBOX_APP_KEY)
        LSApplicationQueriesSchemes:
          - dbapi-2
          - dbapi-8-emm
        CFBundleURLTypes:
          - CFBundleURLName: "com.janeyou.echoooo.oauth"
            CFBundleURLSchemes:
              - db-$(DROPBOX_APP_KEY)
